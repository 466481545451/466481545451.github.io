<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SL Bypass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0b0b0f 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 80px rgba(0, 180, 216, 0.15);
            text-align: center;
            transition: all 0.3s ease;
        }
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 180, 216, 0.4);
            font-size: 28px;
            font-weight: 900;
            color: white;
        }
        .brand-text {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, #00b4d8, #48cae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 28px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #b0b0c0;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        input[type="text"]:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        .turnstile-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .switch-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 20px;
        }
        .switch-label {
            font-size: 14px;
            color: #b0b0c0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2a2a3a;
            transition: 0.3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #00b4d8;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            box-shadow: 0 15px 30px rgba(0, 119, 182, 0.4);
            margin-bottom: 24px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 180, 216, 0.5);
        }
        .btn:disabled {
            background: #2a2a3a;
            box-shadow: none;
            transform: none;
            cursor: wait;
            opacity: 0.7;
        }
        .result-box {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #d0d0e0;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4caf50; font-weight: bold; }
        .error { color: #ff6b6b; font-weight: bold; }
        .time { color: #aaa; font-size: 12px; margin-top: 8px; }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #606070;
            text-align: center;
        }
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00b4d8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="brand-icon">SL</div>
        <div class="brand-text">SL Bypass</div>
    </div>
    <div class="subtitle">SL 绕过</div>

    <div class="input-group">
        <label for="targetUrl">Delta链接</label>
        <input type="text" id="targetUrl" placeholder="https://auth.platorelay.com/a?d=xxxx" autocomplete="off">
    </div>

    <!-- Turnstile 开关 -->
    <div class="switch-wrapper">
        <span class="switch-label">🔒 启用 CF 验证</span>
        <label class="switch">
            <input type="checkbox" id="cfToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <!-- Turnstile 组件容器，默认显示 -->
    <div class="turnstile-wrapper" id="turnstileWrapper">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADd32DaCqVylLZly" data-callback="onTurnstileSuccess"></div>
    </div>

    <button id="bypassBtn" class="btn" onclick="startBypass()">开始绕过</button>

    <div class="result-box" id="resultBox"></div>

    <div class="footer">
        7891<br>
        7891
    </div>
</div>

<script>
    const WORKER_URL = 'https://tf-bypass-lootlabs.339629740.workers.dev/';
    const DEFAULT_API_KEY = 'api-keyA1B2C3D4E5F6G7H8-000001';
    let turnstileToken = null;

    const resultBox = document.getElementById('resultBox');
    const bypassBtn = document.getElementById('bypassBtn');
    const targetInput = document.getElementById('targetUrl');
    const cfToggle = document.getElementById('cfToggle');
    const turnstileWrapper = document.getElementById('turnstileWrapper');

    // 监听开关变化：显示/隐藏 Turnstile 组件
    cfToggle.addEventListener('change', function(e) {
        if (e.target.checked) {
            turnstileWrapper.style.display = 'flex';
            // 如果之前重置过 token，可以重新渲染 Turnstile（但 api.js 会自动处理，无需额外操作）
        } else {
            turnstileWrapper.style.display = 'none';
            turnstileToken = null; // 关闭时清除 token
        }
    });

    window.onTurnstileSuccess = function(token) {
        turnstileToken = token;
    };

    function resetTurnstile() {
        if (window.turnstile && cfToggle.checked) {
            window.turnstile.reset();
        }
        turnstileToken = null;
    }

    function showResult(html) {
        resultBox.innerHTML = html;
        resultBox.style.display = 'block';
    }

    function clearResult() {
        resultBox.style.display = 'none';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function startBypass() {
        const url = targetInput.value.trim();
        if (!url) {
            showResult('<span class="error">请输入忍者链接</span>');
            return;
        }

        // 检查 Turnstile 是否启用且需要验证
        const isCfEnabled = cfToggle.checked;
        if (isCfEnabled && !turnstileToken) {
            showResult('<span class="error">请先完成 cloudflare 验证（点击小方框，如果没有请等待）</span>');
            return;
        }

        try {
            new URL(url);
        } catch (e) {
            showResult('<span class="error">链接格式不正确</span>');
            return;
        }

        bypassBtn.disabled = true;
        bypassBtn.innerHTML = '<span class="loading-spinner"></span>正在解析...';
        clearResult();

        const startTime = performance.now();

        try {
            const payload = {
                api_key: DEFAULT_API_KEY,
                url: url
            };
            // 只有当开关开启且 token 存在时才添加
            if (isCfEnabled && turnstileToken) {
                payload.turnstile_token = turnstileToken;
            }

            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(3);

            if (data.status === 'success' && data.result) {
                const key = data.result;
                const lowerKey = key.toLowerCase();
                if (lowerKey.includes('session expired') || lowerKey.includes('expired link')) {
                    showResult(`
                        <div class="error">❌ 链接已过期，请获取新的忍者链接</div>
                        <div class="time">解析用时: ${elapsed}s</div>
                    `);
                } else if (lowerKey.includes('no message provided') || lowerKey.includes('invalid link')) {
                    showResult(`
                        <div class="error">❌ 链接已失效，请重新获取忍者链接</div>
                        <div class="time">解卡时间: ${elapsed}s</div>
                    `);
                } else {
                    showResult(`
                        <div class="success">✅ 解卡成功！</div>
                        <div style="margin-top:12px; background:rgba(0,180,216,0.1); padding:12px; border-radius:10px;">
                            ${escapeHtml(key)}
                        </div>
                        <div class="time">解卡时间: ${elapsed}s</div>
                    `);
                }
            } else {
                let message = data.message || '未知错误';
                if (data.error === 'turnstile_verify_failed') {
                    message = 'cloudflare验证失败，请刷新页面重试';
                    resetTurnstile();
                }
                showResult(`
                    <div class="error">❌ 解卡失败: ${escapeHtml(message)}</div>
                    <div class="time">解卡时间: ${elapsed}s</div>
                `);
            }
        } catch (error) {
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(3);
            showResult(`
                <div class="error">❌ 网络错误或api无响应</div>
                <div style="margin-top:8px; font-size:12px; color:#aaa;">${escapeHtml(error.message)}</div>
                <div class="time">耗时: ${elapsed}s</div>
            `);
        } finally {
            bypassBtn.disabled = false;
            bypassBtn.innerHTML = '开始绕过';
            // 如果开关开启，重置 Turnstile；否则无需重置
            if (isCfEnabled) resetTurnstile();
        }
    }

    targetInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            startBypass();
        }
    });
</script>
</body>
</html>
